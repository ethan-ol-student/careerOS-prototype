name: CI

# Green-build gate: lint + intelligence checks + build/typecheck must pass.
# Deploys are handled by Vercel's GitHub integration (auto-deploy on push to
# main). Database migrations are applied out-of-band with `prisma migrate
# deploy` (see README / docs). This workflow needs NO secrets.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # postinstall runs `prisma generate` — needs no DB connection
      # (prisma.config.ts falls back to a placeholder when DATABASE_URL is unset).
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Pure, deterministic engine assertions — no DB, no secrets.
      - name: Intelligence engine checks
        run: npm run check:intelligence

      # `next build` also runs the TS typecheck. The env vars are dummies:
      # the build never connects to a real database.
      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-placeholder-not-a-real-secret
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
          DIRECT_URL: postgresql://user:pass@localhost:5432/db?schema=public
